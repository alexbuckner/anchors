<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anchors panel preview</title>
  <style>
    html, body, iframe { width: 100%; height: 100%; margin: 0; border: 0; overflow: hidden; background: #17181b; }
    iframe { display: block; }
  </style>
</head>
<body>
  <iframe title="Anchors panel preview"></iframe>
  <script type="module">
    const [panelMarkup, messages] = await Promise.all([
      fetch('/panel.html').then(response => response.text()),
      fetch('/_locales/en/messages.json').then(response => response.json())
    ]);
    const prepared = panelMarkup
      .replace('<head>', '<head><base href="/">')
      .replace(
        '<script type="module" src="panel.js"><\/script>',
        `<script>window.__ANCHORS_MESSAGES__ = ${JSON.stringify(messages)};<\/script>` +
        '<script src="/tests/panel-preview-mock.js"><\/script>' +
        '<script type="module" src="/panel.js"><\/script>'
      );
    const frame = document.querySelector('iframe');
    const requestedOverlay = new URLSearchParams(location.search).get('open');
    if (requestedOverlay) {
      frame.addEventListener('load', () => {
        setTimeout(() => {
          const doc = frame.contentDocument;
          if (requestedOverlay === 'palette') doc?.querySelector('#open-palette')?.click();
          if (requestedOverlay === 'clear') {
            doc?.querySelector('.row.depth1 .btns button[aria-label="Actions"]')?.click();
            setTimeout(() => [...(doc?.querySelectorAll('#menu button') || [])]
              .find(button => button.textContent.includes('Clear cookies'))?.click(), 25);
          }
          if (requestedOverlay === 'conflict') {
            doc?.querySelector('#open-settings')?.click();
            setTimeout(() => doc?.querySelector('#sync-now')?.click(), 25);
          }
        }, 80);
      }, { once: true });
    }
    frame.srcdoc = prepared;
  </script>
</body>
</html>
